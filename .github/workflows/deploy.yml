name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, 'chore: publish build output') }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Verify lock file is in sync
        run: |
          echo "Node version: $(node --version)"
          echo "NPM version: $(npm --version)"
          echo "Checking package-lock.json is in sync with package.json..."
          npm ci --dry-run || {
            echo "::error::package-lock.json is out of sync with package.json."
            echo "::error::Run 'npm install' locally and commit the updated lock file."
            exit 1
          }
          echo "Lock file is in sync. Proceeding with install."

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          CI: false
          REACT_APP_GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Copy build output to repository root
        run: |
          rm -rf assets static asset-manifest.json robots.txt sitemap.xml manifest.json og-image.svg
          cp -R build/. .

      - name: Commit published build output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html assets static asset-manifest.json robots.txt sitemap.xml manifest.json og-image.svg
          if git diff --cached --quiet; then
            echo "Published output is already up to date."
          else
            git commit -m "chore: publish build output"
            git push
          fi
