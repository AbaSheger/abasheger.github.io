<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1a2235"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect width="800" height="4" fill="url(#accent)"/>

  <!-- Header -->
  <text x="40" y="52" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" fill="white">Guardrail4J</text>
  <text x="40" y="78" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">LLM Cost Control for Spring Boot · Annotation-driven budget enforcement</text>

  <!-- Divider -->
  <rect x="40" y="92" width="720" height="1" fill="#1e3a2f"/>

  <!-- Code snippet panel -->
  <rect x="40" y="108" width="310" height="130" rx="8" fill="#0d1117" stroke="#22c55e" stroke-width="1.5"/>
  <text x="58" y="128" font-family="monospace, monospace" font-size="11" fill="#8b5cf6">@LLMGuarded(</text>
  <text x="66" y="144" font-family="monospace, monospace" font-size="11" fill="#94a3b8">  provider = <tspan fill="#f59e0b">"openai"</tspan>,</text>
  <text x="66" y="160" font-family="monospace, monospace" font-size="11" fill="#94a3b8">  model = <tspan fill="#f59e0b">"gpt-4o-mini"</tspan>,</text>
  <text x="66" y="176" font-family="monospace, monospace" font-size="11" fill="#94a3b8">  userId = <tspan fill="#f59e0b">"#userId"</tspan>,</text>
  <text x="66" y="192" font-family="monospace, monospace" font-size="11" fill="#94a3b8">  onViolation = <tspan fill="#ef4444">BLOCK</tspan></text>
  <text x="58" y="208" font-family="monospace, monospace" font-size="11" fill="#8b5cf6">)</text>
  <text x="58" y="226" font-family="monospace, monospace" font-size="11" fill="#3b82f6">public</text>
  <text x="101" y="226" font-family="monospace, monospace" font-size="11" fill="#94a3b8">String summarize(...)</text>

  <!-- Arrow from code to engine -->
  <line x1="354" y1="172" x2="388" y2="172" stroke="#475569" stroke-width="1.5"/>
  <polygon points="388,167 396,172 388,177" fill="#475569"/>
  <text x="371" y="165" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">AOP</text>

  <!-- Budget Engine box -->
  <rect x="396" y="108" width="170" height="130" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="481" y="130" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#3b82f6" text-anchor="middle">Budget Engine</text>
  <rect x="412" y="140" width="138" height="1" fill="#1e3a5f"/>
  <text x="481" y="158" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Cost Estimator</text>
  <text x="481" y="174" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Daily / Monthly Limits</text>
  <text x="481" y="190" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Per-User · Per-Tenant</text>
  <text x="481" y="206" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">UsageStore</text>
  <text x="481" y="222" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">SpEL Identity</text>

  <!-- Arrows to decisions -->
  <line x1="570" y1="172" x2="604" y2="172" stroke="#475569" stroke-width="1.5"/>
  <polygon points="604,167 612,172 604,177" fill="#475569"/>

  <!-- Decision cards -->
  <!-- ALLOW -->
  <rect x="614" y="108" width="86" height="28" rx="5" fill="#0f2a1a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="657" y="126" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#22c55e" text-anchor="middle">✓ ALLOW</text>

  <!-- WARN -->
  <rect x="614" y="144" width="86" height="28" rx="5" fill="#1a1a0a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="657" y="162" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#f59e0b" text-anchor="middle">⚠ WARN</text>

  <!-- BLOCK -->
  <rect x="614" y="180" width="86" height="28" rx="5" fill="#1a0a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="657" y="198" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ef4444" text-anchor="middle">✕ BLOCK</text>

  <!-- FALLBACK -->
  <rect x="614" y="216" width="86" height="28" rx="5" fill="#0f172a" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="657" y="234" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#8b5cf6" text-anchor="middle">↩ FALLBACK</text>

  <!-- Connect arrows to decisions -->
  <line x1="612" y1="162" x2="613" y2="122" stroke="#475569" stroke-width="1"/>
  <line x1="612" y1="162" x2="613" y2="158" stroke="#475569" stroke-width="1"/>
  <line x1="612" y1="162" x2="613" y2="194" stroke="#475569" stroke-width="1"/>
  <line x1="612" y1="162" x2="613" y2="230" stroke="#475569" stroke-width="1"/>

  <!-- Divider -->
  <rect x="40" y="255" width="720" height="1" fill="#1e3a2f"/>

  <!-- Config section -->
  <text x="40" y="278" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#94a3b8">Budget Configuration (YAML)</text>

  <!-- Config items -->
  <rect x="40" y="290" width="178" height="52" rx="6" fill="#0d1117" stroke="#1e3a5f" stroke-width="1"/>
  <text x="50" y="308" font-family="monospace, monospace" font-size="10" fill="#22c55e">dailyBudgetUsd: 5.00</text>
  <text x="50" y="324" font-family="monospace, monospace" font-size="10" fill="#22c55e">monthlyBudgetUsd: 50.00</text>
  <text x="50" y="334" font-family="monospace, monospace" font-size="9" fill="#64748b">  global limits</text>

  <rect x="228" y="290" width="198" height="52" rx="6" fill="#0d1117" stroke="#1e3a5f" stroke-width="1"/>
  <text x="238" y="308" font-family="monospace, monospace" font-size="10" fill="#3b82f6">perUserDailyBudgetUsd: 1.00</text>
  <text x="238" y="324" font-family="monospace, monospace" font-size="10" fill="#3b82f6">perTenantMonthlyBudgetUsd: 15</text>
  <text x="238" y="334" font-family="monospace, monospace" font-size="9" fill="#64748b">  scoped limits</text>

  <rect x="436" y="290" width="324" height="52" rx="6" fill="#0d1117" stroke="#1e3a5f" stroke-width="1"/>
  <text x="446" y="308" font-family="monospace, monospace" font-size="10" fill="#f59e0b">pricing.openai:gpt-4o-mini:</text>
  <text x="446" y="322" font-family="monospace, monospace" font-size="10" fill="#94a3b8">  inputPer1MUsd: 0.15  outputPer1MUsd: 0.60</text>
  <text x="446" y="334" font-family="monospace, monospace" font-size="9" fill="#64748b">  provider/model price table</text>

  <!-- Monitoring endpoints -->
  <rect x="40" y="358" width="720" height="36" rx="8" fill="#0a1628" stroke="#3b82f6" stroke-width="1"/>
  <text x="60" y="375" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#3b82f6">Monitoring:</text>
  <text x="140" y="375" font-family="monospace, monospace" font-size="11" fill="#94a3b8">/guardrail4j/health</text>
  <text x="310" y="375" font-family="monospace, monospace" font-size="11" fill="#94a3b8">/guardrail4j/usage</text>
  <text x="468" y="375" font-family="monospace, monospace" font-size="11" fill="#94a3b8">/guardrail4j/usage/summary</text>
  <text x="680" y="375" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">REST</text>

  <!-- Tech tags -->
  <rect x="40" y="406" width="60" height="20" rx="4" fill="#0f2a1a"/>
  <text x="70" y="420" font-family="system-ui, sans-serif" font-size="10" fill="#22c55e" text-anchor="middle">Java 21</text>

  <rect x="108" y="406" width="74" height="20" rx="4" fill="#0f2a1a"/>
  <text x="145" y="420" font-family="system-ui, sans-serif" font-size="10" fill="#22c55e" text-anchor="middle">Spring Boot</text>

  <rect x="190" y="406" width="74" height="20" rx="4" fill="#0f2a1a"/>
  <text x="227" y="420" font-family="system-ui, sans-serif" font-size="10" fill="#3b82f6" text-anchor="middle">Spring AOP</text>

  <rect x="272" y="406" width="50" height="20" rx="4" fill="#0f2a1a"/>
  <text x="297" y="420" font-family="system-ui, sans-serif" font-size="10" fill="#f59e0b" text-anchor="middle">Maven</text>

  <rect x="330" y="406" width="50" height="20" rx="4" fill="#0f2a1a"/>
  <text x="355" y="420" font-family="system-ui, sans-serif" font-size="10" fill="#8b5cf6" text-anchor="middle">MIT</text>
</svg>
