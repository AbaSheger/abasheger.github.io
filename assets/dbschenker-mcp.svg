<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect width="800" height="4" fill="url(#accent)"/>

  <!-- Header -->
  <text x="40" y="52" font-family="system-ui, sans-serif" font-size="26" font-weight="bold" fill="white">DB Schenker Shipment Tracker</text>
  <text x="40" y="78" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">Model Context Protocol Server · Built for Sendify Code Challenge</text>

  <!-- Divider -->
  <rect x="40" y="92" width="720" height="1" fill="#1e3a5f"/>

  <!-- Flow cards row -->
  <!-- Card 1: Claude Desktop -->
  <rect x="40" y="112" width="128" height="88" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="104" y="145" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#3b82f6" text-anchor="middle">Claude</text>
  <text x="104" y="161" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#3b82f6" text-anchor="middle">Desktop</text>
  <text x="104" y="183" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">MCP Client</text>

  <!-- Arrow 1 -->
  <line x1="172" y1="156" x2="198" y2="156" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="185" y="148" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">stdio</text>

  <!-- Card 2: MCP Server -->
  <rect x="200" y="112" width="128" height="88" rx="8" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="264" y="145" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#06b6d4" text-anchor="middle">MCP Server</text>
  <text x="264" y="162" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">track_shipment</text>
  <text x="264" y="183" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">TypeScript</text>

  <!-- Arrow 2 -->
  <line x1="332" y1="156" x2="358" y2="156" stroke="#475569" stroke-width="1.5"/>
  <polygon points="358,151 366,156 358,161" fill="#475569"/>
  <text x="347" y="148" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">HTTP</text>

  <!-- Card 3: CAPTCHA Handler -->
  <rect x="360" y="112" width="128" height="88" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="424" y="145" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#f59e0b" text-anchor="middle">CAPTCHA</text>
  <text x="424" y="161" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#f59e0b" text-anchor="middle">Solver</text>
  <text x="424" y="183" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Proof-of-Work</text>

  <!-- Arrow 3 -->
  <line x1="492" y1="156" x2="518" y2="156" stroke="#475569" stroke-width="1.5"/>
  <polygon points="518,151 526,156 518,161" fill="#475569"/>
  <text x="507" y="148" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">retry</text>

  <!-- Card 4: DB Schenker API -->
  <rect x="520" y="112" width="128" height="88" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="584" y="145" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#22c55e" text-anchor="middle">DB Schenker</text>
  <text x="584" y="161" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#22c55e" text-anchor="middle">Public API</text>
  <text x="584" y="183" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">DSV Tracking</text>

  <!-- Arrow 4 -->
  <line x1="652" y1="156" x2="678" y2="156" stroke="#475569" stroke-width="1.5"/>
  <polygon points="678,151 686,156 678,161" fill="#475569"/>

  <!-- Card 5: Shipment Result -->
  <rect x="680" y="112" width="80" height="88" rx="8" fill="#0f2a1a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="720" y="149" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#22c55e" text-anchor="middle">Shipment</text>
  <text x="720" y="165" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">JSON</text>
  <text x="720" y="181" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Typed</text>

  <!-- Divider -->
  <rect x="40" y="222" width="720" height="1" fill="#1e3a5f"/>

  <!-- Output schema section -->
  <text x="40" y="248" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#94a3b8">Shipment Output Schema</text>

  <!-- Schema tags -->
  <rect x="40" y="260" width="100" height="26" rx="5" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="90" y="278" font-family="monospace, monospace" font-size="11" fill="#3b82f6" text-anchor="middle">sender/receiver</text>

  <rect x="150" y="260" width="100" height="26" rx="5" fill="#1e293b" stroke="#06b6d4" stroke-width="1"/>
  <text x="200" y="278" font-family="monospace, monospace" font-size="11" fill="#06b6d4" text-anchor="middle">packageDetails</text>

  <rect x="260" y="260" width="110" height="26" rx="5" fill="#1e293b" stroke="#8b5cf6" stroke-width="1"/>
  <text x="315" y="278" font-family="monospace, monospace" font-size="11" fill="#8b5cf6" text-anchor="middle">trackingHistory</text>

  <rect x="380" y="260" width="110" height="26" rx="5" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <text x="435" y="278" font-family="monospace, monospace" font-size="11" fill="#f59e0b" text-anchor="middle">packageEvents</text>

  <rect x="500" y="260" width="110" height="26" rx="5" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
  <text x="555" y="278" font-family="monospace, monospace" font-size="11" fill="#22c55e" text-anchor="middle">estDelivery</text>

  <!-- Highlight box -->
  <rect x="40" y="308" width="720" height="46" rx="8" fill="#0f2a1a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="60" y="330" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#22c55e">✓  Retry with exponential backoff · CAPTCHA proof-of-work solving · Zod-validated output schema</text>
  <text x="60" y="348" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">Runs over stdio — drop-in for Claude Desktop · offline tests with mocked HTTP responses</text>

  <!-- Tech tags bottom -->
  <rect x="40" y="372" width="74" height="22" rx="4" fill="#1e3a5f"/>
  <text x="77" y="387" font-family="system-ui, sans-serif" font-size="11" fill="#3b82f6" text-anchor="middle">TypeScript</text>

  <rect x="122" y="372" width="58" height="22" rx="4" fill="#1e3a5f"/>
  <text x="151" y="387" font-family="system-ui, sans-serif" font-size="11" fill="#06b6d4" text-anchor="middle">Node.js</text>

  <rect x="188" y="372" width="40" height="22" rx="4" fill="#1e3a5f"/>
  <text x="208" y="387" font-family="system-ui, sans-serif" font-size="11" fill="#8b5cf6" text-anchor="middle">MCP</text>

  <rect x="236" y="372" width="36" height="22" rx="4" fill="#1e3a5f"/>
  <text x="254" y="387" font-family="system-ui, sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle">Zod</text>

  <rect x="280" y="372" width="48" height="22" rx="4" fill="#1e3a5f"/>
  <text x="304" y="387" font-family="system-ui, sans-serif" font-size="11" fill="#22c55e" text-anchor="middle">Vitest</text>
</svg>
